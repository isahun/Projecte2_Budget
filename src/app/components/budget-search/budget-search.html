<section class="filters-container" aria-labelledby="filters-title">
  <h3 id="filters-title" class="sr-only">Filtres de cerca i ordenació</h3>

  <fieldset class="sort-controls">
    <!-- fieldset agrupa els botons d'ordenació semànticament -->

    <legend>Ordenar per:</legend>

    <!-- Cada botó té dues responsabilitats:
    1. (click) → crida changeSort() per canviar el criteri o invertir l'ordre
    2. [class.active] → afegeix la classe CSS 'active' si aquest és el criteri actiu -->

    <button type="button" (click)="changeSort('date')" [class.active]="budgetService.sortBy() === 'date'">
      Data
      <!-- Mostrem la fletxa només si aquest criteri és l'actiu. L'operador ternari decideix si és ascendent ↑ o descendent ↓ -->
      @if (budgetService.sortBy() === 'date') {
      {{ budgetService.sortOrder() === 'asc' ? '↑' : '↓' }}
      }
    </button>

    <button type="button" (click)="changeSort('name')" [class.active]="budgetService.sortBy() === 'name'">
      Nom
      @if (budgetService.sortBy() === 'name') {
      {{ budgetService.sortOrder() === 'asc' ? '↑' : '↓' }}
      }
    </button>

    <button type="button" (click)="changeSort('amount')" [class.active]="budgetService.sortBy() === 'amount'">
      Import
      @if (budgetService.sortBy() === 'amount') {
      {{ budgetService.sortOrder() === 'asc' ? '↑' : '↓' }}
      }
    </button>
  </fieldset>

  <div class="search-container">
    <label for="search" class="sr-only">Cercar per nom</label>
    <span class="search-icon">🔍</span>
    <!-- (input) s'activa a cada tecla que l'usuari prem, no només en perdre el focus com (change). Això fa que la cerca sigui instantània mentre escriu -->
    <input id="search" type="text" placeholder="Cerca per nom de client" (input)="onSearch($event)">
  </div>

  <!-- Crida directament resetFilters() del servei sense passar pel .ts del component, és vàlid per a accions simples que no necessiten lògica addicional -->
  <button type="button" (click)="budgetService.resetFilters()" class="btn-reset">
    Netejar filtres
  </button>
</section>
