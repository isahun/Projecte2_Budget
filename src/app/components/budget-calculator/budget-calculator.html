<!-- Contenidor principal de la calculadora de serveis -->

<section class="calculator-container">
  <!-- @for és el bucle modern d'Angular (equivalent a *ngFor). Itera sobre el signal services() — els parèntesis () són obligatoris per llegir el valor del signal. track s.id ajuda Angular a identificar cada element i només re-renderitzar els que canvien -->
  @for (s of budgetService.services(); track s.id) {
  <!-- Per cada servei, mostrem la seva targeta passant-li l'objecte sencer via [service] -->
  <app-service-card [service]="s"></app-service-card>
  <!-- Només mostrem el personalitzador web si el servei és 'web' I està seleccionat. Així evitem renderitzar el component innecessàriament -->
  @if (s.id === 'web' && s.isSelected) {
  <app-web-customizer></app-web-customizer>
  }
  } @empty {
  <!-- @empty s'executa automàticament si l'array de services() està buit -->
  <p>No hi ha serveis disponibles.</p>
  }

  <!-- Mostra el preu total calculat pel computed totalPrice() del servei. Els parèntesis () llegeixen el valor actual del signal/computed -->
  <div class="total display">
    <p>Preu pressuposat: <span>{{ budgetService.totalPrice() }}€</span></p>
  </div>
</section>
